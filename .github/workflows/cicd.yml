name: cicd

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./JobWatch/JobWatch
          file: ./JobWatch/JobWatch/Dockerfile
          push: true
          build-args: |
            BUILD_SHA=${{ github.sha }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/jobwatch:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/jobwatch:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update Container App
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update \
              --name jobwatch \
              --resource-group JobWatchRG \
              --image ${{ secrets.DOCKERHUB_USERNAME }}/jobwatch:${{ github.sha }}
